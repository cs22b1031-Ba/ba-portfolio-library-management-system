  <rect x="86" y="1080" width="1628" height="64" rx="18" fill="#EEE8DC"/>
  <text x="118" y="1110" fill="#5E6977" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">BA Summary Insight</text>
  <text x="118" y="1134" fill="#667483" font-family="Arial, Helvetica, sans-serif" font-size="17">The current state is people-dependent rather than process-controlled. This creates operational delays, inconsistent records, weak visibility, and unnecessary member dissatisfaction.</text>
</svg>
