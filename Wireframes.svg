  <text x="156" y="346" fill="#22364D" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Login and Role Selection</text>
  <text x="156" y="374" fill="#6A7783" font-family="Arial, Helvetica, sans-serif" font-size="16">Supports secure access for students, librarians, and administrators.</text>

  <circle cx="1036" cy="338" r="18" fill="#DDEAF8"/><text x="1030" y="345" fill="#23486E" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">2</text>
  <text x="1066" y="346" fill="#22364D" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Dashboard and Operational Overview</text>
  <text x="1066" y="374" fill="#6A7783" font-family="Arial, Helvetica, sans-serif" font-size="16">Highlights KPIs, alerts, and quick access to daily library operations.</text>

  <circle cx="126" cy="882" r="18" fill="#DDEAF8"/><text x="120" y="889" fill="#23486E" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">3</text>
  <text x="156" y="890" fill="#22364D" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Catalog Search and Availability</text>
  <text x="156" y="918" fill="#6A7783" font-family="Arial, Helvetica, sans-serif" font-size="16">Enables quick book lookup, filters, and visibility into copy-level status.</text>

  <circle cx="1036" cy="882" r="18" fill="#DDEAF8"/><text x="1030" y="889" fill="#23486E" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">4</text>
  <text x="1066" y="890" fill="#22364D" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Issue / Return Transaction Screen</text>
  <text x="1066" y="918" fill="#6A7783" font-family="Arial, Helvetica, sans-serif" font-size="16">Designed for fast circulation with validation and issue control.</text>

