  <text x="122" y="119" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">LIBRARY MANAGEMENT SYSTEM - WIREFRAMES</text>
  <text x="122" y="154" fill="#C7D4E1" font-family="Arial, Helvetica, sans-serif" font-size="18">Low-fidelity screens for stakeholder review, requirement confirmation, and solution visualization</text>

  <rect x="84" y="198" width="1732" height="88" rx="18" fill="#F4F7FB" stroke="#D8E1EC"/>
  <text x="118" y="228" fill="#31495F" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">Presentation Notes</text>
  <text x="118" y="252" fill="#61707D" font-family="Arial, Helvetica, sans-serif" font-size="18">These wireframes are intentionally low-fidelity and business-focused. They are designed to support workshops,</text>
  <text x="118" y="276" fill="#61707D" font-family="Arial, Helvetica, sans-serif" font-size="18">usability discussion, and early sign-off on scope and user flow.</text>

